<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión · Iron Play</title>
    <link rel="stylesheet" href="css/login.css" />
</head>

<body>
    <main class="login-container">
        <div class="login-card">
            <div class="login-header">
                <span class="logo-icon">⚡</span>
                <h1>Iron Play</h1>
                <p>Acceso al panel de administración</p>
            </div>

            <form id="loginForm" class="login-form" autocomplete="off">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required />
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required />
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
                <div id="loginError" class="error-message" aria-live="polite"></div>
            </form>

            <p class="login-footer">
                ¿No tienes cuenta? <a href="#" id="createDefaultUser">Crear usuario predeterminado</a>
            </p>

            <!-- Nuevo botón Volver al inicio -->
            <p class="login-footer back-link">
                <a href="index.html" class="btn-back">← Volver al inicio</a>
            </p>
        </div>
    </main>

    <script src="js/login.js"></script>
</body>

</html>
